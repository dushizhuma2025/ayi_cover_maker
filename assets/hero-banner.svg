<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 380" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090D16" />
      <stop offset="50%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#1E1035" />
    </linearGradient>

    <!-- Accent Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#EC4899" />
    </linearGradient>

    <linearGradient id="cardGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#0F172A" stop-opacity="0.9" />
    </linearGradient>

    <linearGradient id="cardGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312E81" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#1E1B4B" stop-opacity="0.8" />
    </linearGradient>

    <!-- Glow Filters -->
    <filter id="glowPrimary" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#FFFFFF" stroke-opacity="0.03" stroke-width="1" />
    </pattern>
  </defs>

  <!-- Background Layer -->
  <rect width="850" height="380" rx="16" fill="url(#bgGrad)" />
  <rect width="850" height="380" rx="16" fill="url(#grid)" />

  <!-- Glow Decorative Circles -->
  <circle cx="120" cy="80" r="140" fill="#6366F1" fill-opacity="0.15" filter="url(#glowPrimary)" />
  <circle cx="750" cy="300" r="130" fill="#EC4899" fill-opacity="0.12" filter="url(#glowPrimary)" />
  <circle cx="450" cy="200" r="90" fill="#06B6D4" fill-opacity="0.08" filter="url(#glowCyan)" />

  <!-- Top Badge / Category -->
  <g transform="translate(48, 42)">
    <rect width="180" height="28" rx="14" fill="#1E1B4B" stroke="#6366F1" stroke-opacity="0.4" stroke-width="1" />
    <circle cx="16" cy="14" r="5" fill="#10B981" />
    <text x="30" y="18" fill="#A5B4FC" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="600" letter-spacing="0.5">AGENT COVER SKILL</text>
  </g>

  <!-- Main Title & Subtitle -->
  <g transform="translate(48, 115)">
    <text x="0" y="0" fill="#FFFFFF" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="34" font-weight="800" letter-spacing="-0.5">阿一封面制作 Skill</text>
    <text x="290" y="-4" fill="#818CF8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="600">v1.0</text>
    <text x="0" y="32" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="400">文章草稿 ➔ 全平台多尺寸统一风格 AI 绘图提示词生成器</text>
  </g>

  <!-- Feature Pills -->
  <g transform="translate(48, 185)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="135" height="32" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
    <text x="14" y="20" fill="#F3F4F6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="500">🎨 31 种内置风格</text>
    
    <!-- Pill 2 -->
    <rect x="147" y="0" width="135" height="32" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
    <text x="161" y="20" fill="#F3F4F6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="500">📐 5 大画幅比例</text>
    
    <!-- Pill 3 -->
    <rect x="294" y="0" width="135" height="32" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
    <text x="308" y="20" fill="#F3F4F6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="500">🧠 智能标题抽取</text>

    <!-- Pill 4 -->
    <rect x="0" y="42" width="282" height="32" rx="8" fill="#1E293B" stroke="#334155" stroke-width="1" />
    <text x="14" y="62" fill="#F3F4F6" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12" font-weight="500">⚡ 适配 GPT-4o / Gemini / 即梦全平台</text>
  </g>

  <!-- Flow Illustration Diagram on the Right -->
  <g transform="translate(480, 42)">
    <!-- Main Right Border Container Card -->
    <rect width="322" height="296" rx="14" fill="url(#cardGrad1)" stroke="#334155" stroke-opacity="0.8" stroke-width="1" />
    
    <!-- Card Header -->
    <path d="M 0 14 C 0 6, 6 0, 14 0 L 308 0 C 316 0, 322 6, 322 14 L 322 40 L 0 40 Z" fill="#0F172A" />
    <circle cx="20" cy="20" r="5" fill="#EF4444" />
    <circle cx="36" cy="20" r="5" fill="#F59E0B" />
    <circle cx="52" cy="20" r="5" fill="#10B981" />
    <text x="72" y="24" fill="#64748B" font-family="monospace" font-size="11">ayi-cover-workflow.pipeline</text>

    <!-- Input Node -->
    <g transform="translate(20, 58)">
      <rect width="282" height="46" rx="8" fill="#1E1B4B" stroke="#6366F1" stroke-width="1" stroke-dasharray="3 3" />
      <text x="14" y="20" fill="#818CF8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700">INPUT</text>
      <text x="14" y="36" fill="#E2E8F0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="12">长短文章 / 笔记草稿 / 主题指定</text>
    </g>

    <!-- Process Connection Arrow -->
    <path d="M 161 104 L 161 116" stroke="#818CF8" stroke-width="2" stroke-dasharray="2 2" />
    <polygon points="161,120 157,114 165,114" fill="#818CF8" />

    <!-- Core Engine Node -->
    <g transform="translate(20, 122)">
      <rect width="282" height="54" rx="8" fill="url(#cardGrad2)" stroke="#8B5CF6" stroke-width="1" />
      <text x="14" y="22" fill="#C084FC" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11" font-weight="700">CORE ENGINE (ayi-cover)</text>
      <text x="14" y="40" fill="#CBD5E1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="11">自动萃取视觉隐喻 ✕ 匹配31种视觉风格</text>
    </g>

    <!-- Output Connection Arrows -->
    <path d="M 161 176 L 161 188" stroke="#EC4899" stroke-width="2" stroke-dasharray="2 2" />
    <polygon points="161,192 157,186 165,186" fill="#EC4899" />

    <!-- Output Ratios Cards Group -->
    <g transform="translate(20, 194)">
      <!-- Ratio Box 1 -->
      <rect x="0" y="0" width="88" height="84" rx="6" fill="#0F172A" stroke="#38BDF8" stroke-width="1" />
      <rect x="24" y="12" width="40" height="48" rx="3" fill="#0284C7" fill-opacity="0.3" stroke="#38BDF8" stroke-width="1" />
      <text x="44" y="40" text-anchor="middle" fill="#38BDF8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700">3:4</text>
      <text x="44" y="72" text-anchor="middle" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9">小红书/抖音</text>

      <!-- Ratio Box 2 -->
      <rect x="97" y="0" width="88" height="84" rx="6" fill="#0F172A" stroke="#F43F5E" stroke-width="1" />
      <rect x="11" y="24" width="66" height="28" rx="3" fill="#E11D48" fill-opacity="0.3" stroke="#F43F5E" stroke-width="1" />
      <text x="141" y="41" text-anchor="middle" fill="#F43F5E" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700">2.35:1</text>
      <text x="141" y="72" text-anchor="middle" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9">公众号头条</text>

      <!-- Ratio Box 3 -->
      <rect x="194" y="0" width="88" height="84" rx="6" fill="#0F172A" stroke="#10B981" stroke-width="1" />
      <rect x="21" y="16" width="46" height="40" rx="3" fill="#059669" fill-opacity="0.3" stroke="#10B981" stroke-width="1" />
      <text x="238" y="40" text-anchor="middle" fill="#10B981" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="10" font-weight="700">4:3/16:9/1:1</text>
      <text x="238" y="72" text-anchor="middle" fill="#94A3B8" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9">全尺寸延展</text>
    </g>
  </g>

  <!-- Bottom Accent Line -->
  <rect x="0" y="374" width="850" height="6" rx="3" fill="url(#primaryGrad)" />
</svg>
